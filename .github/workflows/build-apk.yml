              @JavascriptInterface
              public void saveBase64File(String base64Data, String mimeType, String fileName) {
                  try {
                      final byte[] fileBytes = Base64.decode(base64Data, Base64.DEFAULT);
                      final String fName = fileName;
                      final String fMime = mimeType;
                      
                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              try {
                                  OutputStream os;
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                      ContentValues values = new ContentValues();
                                      values.put(MediaStore.MediaColumns.DISPLAY_NAME, fName);
                                      values.put(MediaStore.MediaColumns.MIME_TYPE, fMime);
                                      values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                                      Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                                      if (uri == null) {
                                          Toast.makeText(MainActivity.this, "Failed to create download target.", Toast.LENGTH_SHORT).show();
                                          return;
                                      }
                                      os = getContentResolver().openOutputStream(uri);
                                      if (os != null) {
                                          os.write(fileBytes);
                                          os.close();
                                          Toast.makeText(MainActivity.this, "File saved to Downloads folder!", Toast.LENGTH_LONG).show();
                                          showNotification("Download Completed", fName + " saved to Downloads.");
                                      }
                                  } else {
                                      java.io.File downloadDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                                      java.io.File file = new java.io.File(downloadDir, fName);
                                      os = new java.io.FileOutputStream(file);
                                      if (os != null) {
                                          os.write(fileBytes);
                                          os.close();
                                          Toast.makeText(MainActivity.this, "File saved to Downloads folder!", Toast.LENGTH_LONG).show();
                                          showNotification("Download Completed", fName + " saved to Downloads.");
                                      }
                                  }
                              } catch (Exception ex) {
                                  ex.printStackTrace();
                                  Toast.makeText(MainActivity.this, "Error saving file: " + ex.getMessage(), Toast.LENGTH_LONG).show();
                              }
                          }
                      });
                  } catch (final Exception e) {
                      e.printStackTrace();
                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              Toast.makeText(MainActivity.this, "Decoder Error: " + e.getMessage(), Toast.LENGTH_LONG).show();
                          }
                      });
                  }
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode == FILECHOOSER_RESULTCODE) {
                      if (mUploadMessage == null) return;
                      Uri[] results = null;
                      if (resultCode == Activity.RESULT_OK) {
                          if (data != null) {
                              String dataString = data.getDataString();
                              ClipData clipData = data.getClipData();
                              if (clipData != null) {
                                  results = new Uri[clipData.getItemCount()];
                                  for (int i = 0; i < clipData.getItemCount(); i++) {
                                      ClipData.Item item = clipData.getItemAt(i);
                                      results[i] = item.getUri();
                                  }
                              }
                              if (dataString != null) {
                                  results = new Uri[]{Uri.parse(dataString)};
                              }
                          }
                      }
                      mUploadMessage.onReceiveValue(results);
                      mUploadMessage = null;
                  }
              }

              @Override
              public void onBackPressed() {
                  mWebView.evaluateJavascript("javascript:if(window.onBackPressed){window.onBackPressed();}else{'default';}", new ValueCallback<String>() {
                      @Override
                      public void onReceiveValue(String value) {
                          if (value == null || value.equals("\\"default\\"") || value.equals("null") || value.equals("false")) {
                              if (mWebView.canGoBack()) {
                                  mWebView.goBack();
                              } else {
                                  showExitDialog();
                              }
                          }
                      }
                  });
              }

              private void showExitDialog() {
                  androidx.appcompat.app.AlertDialog.Builder builder = new androidx.appcompat.app.AlertDialog.Builder(this);
                  builder.setTitle("Exit Application");
                  builder.setMessage("Are you sure you want to exit?");
                  builder.setPositiveButton("Exit", new android.content.DialogInterface.OnClickListener() {
                      @Override
                      public void onClick(android.content.DialogInterface dialog, int which) {
                          finish();
                      }
                  });
                  builder.setNegativeButton("Cancel", new android.content.DialogInterface.OnClickListener() {
                      @Override
                      public void onClick(android.content.DialogInterface dialog, int which) {
                          dialog.dismiss();
                      }
                  });
                  androidx.appcompat.app.AlertDialog dialog = builder.create();
                  dialog.show();
                  int colorPrimary = ContextCompat.getColor(MainActivity.this, R.color.colorPrimary);
                  dialog.getButton(androidx.appcompat.app.AlertDialog.BUTTON_POSITIVE).setTextColor(colorPrimary);
                  dialog.getButton(androidx.appcompat.app.AlertDialog.BUTTON_NEGATIVE).setTextColor(colorPrimary);
              }
          }

              public void scheduleNotification(String title, String message, final int delaySeconds) {
                  Intent alarmIntent = new Intent(this, NotificationReceiver.class);
                  alarmIntent.putExtra("title", title);
                  alarmIntent.putExtra("message", message);
                  android.app.PendingIntent pIntent = android.app.PendingIntent.getBroadcast(this, (int)System.currentTimeMillis(), alarmIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                  android.app.AlarmManager alarmManager = (android.app.AlarmManager) getSystemService(ALARM_SERVICE);
                  if (alarmManager != null) {
                      long triggerAtMillis = System.currentTimeMillis() + (delaySeconds * 1000L);
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                          alarmManager.setExactAndAllowWhileIdle(android.app.AlarmManager.RTC_WAKEUP, triggerAtMillis, pIntent);
                      } else {
                          alarmManager.setExact(android.app.AlarmManager.RTC_WAKEUP, triggerAtMillis, pIntent);
                      }
                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              Toast.makeText(MainActivity.this, "Reminder scheduled in " + delaySeconds + " seconds!", Toast.LENGTH_SHORT).show();
                          }
                      });
                  }
              }


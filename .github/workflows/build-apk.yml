                  @JavascriptInterface
                  public void triggerDynamicNotification(String jsonConfig) {
                      try {
                          org.json.JSONObject config = new org.json.JSONObject(jsonConfig);
                          int id = config.optInt("id", (int) System.currentTimeMillis());
                          String title = config.optString("title", "Alert");
                          String message = config.optString("message", "");

                          if (config.has("delayMs")) {
                              int delayMs = config.optInt("delayMs", 5000);
                              scheduleNotification(title, message, delayMs / 1000);
                              return;
                          }

                          if (config.optBoolean("foregroundService", false)) {
                              startForegroundTask("background_task", title, message);
                              return;
                          }

                          String channelId = config.optString("channelId", "default");
                          if (config.optBoolean("silent", false)) {
                              channelId = "silent_channel";
                          } else if (config.optInt("importance", 3) >= 4 || config.optBoolean("fullScreen", false)) {
                              channelId = "high_importance";
                          } else if (config.has("progress") || config.optBoolean("indeterminate", false)) {
                              channelId = "progress_channel";
                          }

                          NotificationCompat.Builder builder = new NotificationCompat.Builder(mContext, channelId)
                                  .setSmallIcon(mContext.getApplicationInfo().icon)
                                  .setContentTitle(title)
                                  .setContentText(message)
                                  .setAutoCancel(true)
                                  .setVisibility(NotificationCompat.VISIBILITY_PUBLIC);

                          int importance = config.optInt("importance", 3);
                          if (importance >= 4) {
                              builder.setPriority(NotificationCompat.PRIORITY_HIGH)
                                      .setDefaults(NotificationCompat.DEFAULT_ALL);
                          } else if (importance <= 2 || channelId.equals("silent_channel")) {
                              builder.setPriority(NotificationCompat.PRIORITY_MIN);
                          } else {
                              builder.setPriority(NotificationCompat.PRIORITY_DEFAULT);
                          }

                          if (config.optBoolean("ongoing", false)) {
                              builder.setOngoing(true);
                          }

                          if (config.has("badgeCount")) {
                              builder.setNumber(config.optInt("badgeCount", 0));
                          }

                          if (config.has("category")) {
                              builder.setCategory(config.optString("category"));
                          }

                          if (config.has("bigText")) {
                              builder.setStyle(new NotificationCompat.BigTextStyle()
                                      .bigText(config.optString("bigText"))
                                      .setSummaryText(config.optString("summary", "Details")));
                          }

                          if (config.has("bigPictureBase64")) {
                              try {
                                  byte[] decoded = Base64.decode(config.optString("bigPictureBase64"), Base64.DEFAULT);
                                  android.graphics.Bitmap bitmap = android.graphics.BitmapFactory.decodeByteArray(decoded, 0, decoded.length);
                                  builder.setStyle(new NotificationCompat.BigPictureStyle().bigPicture(bitmap));
                              } catch (Exception e) {}
                          }

                          if (config.has("inboxLines")) {
                              org.json.JSONArray lines = config.optJSONArray("inboxLines");
                              if (lines != null) {
                                  NotificationCompat.InboxStyle inbox = new NotificationCompat.InboxStyle();
                                  for (int i = 0; i < lines.length(); i++) {
                                      inbox.addLine(lines.optString(i));
                                  }
                                  builder.setStyle(inbox);
                              }
                          }

                          if (config.has("progress") || config.optBoolean("indeterminate", false)) {
                              int max = config.optInt("maxProgress", 100);
                              int current = config.optInt("progress", 0);
                              boolean ind = config.optBoolean("indeterminate", false);
                              builder.setProgress(max, current, ind);
                          }

                          if (config.has("actions")) {
                              org.json.JSONArray actions = config.optJSONArray("actions");
                              if (actions != null) {
                                  for (int i = 0; i < actions.length(); i++) {
                                      org.json.JSONObject action = actions.optJSONObject(i);
                                      if (action != null) {
                                          String actTitle = action.optString("title");
                                          String actCode = action.optString("actionCode");

                                          Intent actionIntent = new Intent(mContext, MainActivity.class);
                                          actionIntent.putExtra("notification_action", actCode);
                                          actionIntent.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                                          android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(mContext, (int)System.currentTimeMillis() + i, actionIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                                          builder.addAction(android.R.drawable.ic_menu_info_details, actTitle, pIntent);
                                      }
                                  }
                              }
                          }

                          if ("custom".equals(config.optString("type"))) {
                              android.widget.RemoteViews remoteViews = new android.widget.RemoteViews(mContext.getPackageName(), R.layout.custom_notification);
                              remoteViews.setImageViewResource(R.id.custom_icon, mContext.getApplicationInfo().icon);
                              remoteViews.setTextViewText(R.id.custom_title, title);
                              remoteViews.setTextViewText(R.id.custom_text, message);
                              builder.setCustomContentView(remoteViews);
                          }

                          if (config.optBoolean("fullScreen", false)) {
                              Intent fullScreenIntent = new Intent(mContext, MainActivity.class);
                              android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(mContext, 0, fullScreenIntent, android.app.PendingIntent.FLAG_IMMUTABLE);
                              builder.setFullScreenIntent(pIntent, true)
                                      .setCategory(NotificationCompat.CATEGORY_CALL);
                          }

                          Intent mainIntent = new Intent(mContext, MainActivity.class);
                          mainIntent.setFlags(Intent.FLAG_ACTIVITY_SINGLE_TOP | Intent.FLAG_ACTIVITY_CLEAR_TOP);
                          android.app.PendingIntent pMain = android.app.PendingIntent.getActivity(mContext, id, mainIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);
                          builder.setContentIntent(pMain);

                          NotificationManagerCompat manager = NotificationManagerCompat.from(mContext);
                          manager.notify(id, builder.build());

                      } catch (Exception e) {
                          e.printStackTrace();
                      }
                  }
              }

              public static class NotificationReceiver extends android.content.BroadcastReceiver {
                  @Override
                  public void onReceive(android.content.Context context, Intent intent) {
                      String title = intent.getStringExtra("title");
                      String message = intent.getStringExtra("message");
                      if (title == null) title = "Scheduled Reminder";
                      if (message == null) message = "Time to check your app!";

                      NotificationManager manager = (NotificationManager) context.getSystemService(android.content.Context.NOTIFICATION_SERVICE);
                      if (manager == null) return;

                      NotificationCompat.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new NotificationCompat.Builder(context, "default");
                      } else {
                          builder = new NotificationCompat.Builder(context);
                      }

                      Intent appIntent = new Intent(context, MainActivity.class);
                      appIntent.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                      android.app.PendingIntent pIntent = android.app.PendingIntent.getActivity(context, (int)System.currentTimeMillis(), appIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                      builder.setSmallIcon(context.getApplicationInfo().icon)
                              .setContentTitle(title)
                              .setContentText(message)
                              .setAutoCancel(true)
                              .setContentIntent(pIntent);

                      manager.notify((int) System.currentTimeMillis(), builder.build());
                  }
              }

              public static class ForegroundService extends android.app.Service {
                  private android.media.session.MediaSession mMediaSession;

                  @Override
                  public void onCreate() {
                      super.onCreate();
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                          mMediaSession = new android.media.session.MediaSession(this, "MediaPlayback");
                      }
                  }

                  @Override
                  public int onStartCommand(Intent intent, int flags, int startId) {
                      if (intent == null) return START_NOT_STICKY;
                      
                      String taskType = intent.getStringExtra("task_type");
                      if (taskType == null) taskType = "media";

                      NotificationCompat.Builder builder;
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                          builder = new NotificationCompat.Builder(this, "foreground_tasks");
                      } else {
                          builder = new NotificationCompat.Builder(this);
                      }

                      builder.setSmallIcon(getApplicationInfo().icon)
                              .setOngoing(true)
                              .setVisibility(NotificationCompat.VISIBILITY_PUBLIC);

                      Intent notificationIntent = new Intent(this, MainActivity.class);
                      android.app.PendingIntent pendingIntent = android.app.PendingIntent.getActivity(this, 0, notificationIntent, android.app.PendingIntent.FLAG_IMMUTABLE);
                      builder.setContentIntent(pendingIntent);

                      if (taskType.equals("media")) {
                          String trackName = intent.getStringExtra("trackName");
                          String artistName = intent.getStringExtra("artistName");
                          boolean isPlaying = intent.getBooleanExtra("isPlaying", true);

                          builder.setContentTitle(trackName != null ? trackName : "No Audio Playing")
                                  .setContentText(artistName != null ? artistName : "Unknown Track")
                                  .setChannelId("media_channel");

                          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                              builder.setStyle(new androidx.media.app.NotificationCompat.MediaStyle()
                                      .setMediaSession(android.support.v4.media.session.MediaSessionCompat.Token.fromToken(mMediaSession.getSessionToken())));

                              Intent playIntent = new Intent(this, MainActivity.class).putExtra("action", "toggle_play");
                              android.app.PendingIntent pPlay = android.app.PendingIntent.getActivity(this, 1, playIntent, android.app.PendingIntent.FLAG_UPDATE_CURRENT | android.app.PendingIntent.FLAG_IMMUTABLE);

                              if (isPlaying) {
                                  builder.addAction(android.R.drawable.ic_media_pause, "Pause", pPlay);
                              } else {
                                  builder.addAction(android.R.drawable.ic_media_play, "Play", pPlay);
                              }
                          }
                      } else if (taskType.equals("recording")) {
                          String title = intent.getStringExtra("title");
                          String message = intent.getStringExtra("message");
                          builder.setContentTitle(title != null ? title : "Audio Recording Active")
                                  .setContentText(message != null ? message : "Recording live audio in background...")
                                  .setSmallIcon(android.R.drawable.presence_video_busy);
                      } else if (taskType.equals("download")) {
                          String title = intent.getStringExtra("title");
                          String message = intent.getStringExtra("message");
                          builder.setContentTitle(title != null ? title : "File Download Service")
                                  .setContentText(message != null ? message : "Downloading system files...")
                                  .setSmallIcon(android.R.drawable.stat_sys_download);
                      } else if (taskType.equals("upload")) {
                          String title = intent.getStringExtra("title");
                          String message = intent.getStringExtra("message");
                          builder.setContentTitle(title != null ? title : "Upload Service Active")
                                  .setContentText(message != null ? message : "Uploading data package to cloud server...")
                                  .setSmallIcon(android.R.drawable.stat_sys_upload);
                      } else if (taskType.equals("background_task")) {
                          String title = intent.getStringExtra("title");
                          String message = intent.getStringExtra("message");
                          builder.setContentTitle(title != null ? title : "Background Task Running")
                                  .setContentText(message != null ? message : "Processing synchronized database pipelines...")
                                  .setSmallIcon(android.R.drawable.stat_notify_sync);
                      }

                      startForeground(2002, builder.build());
                      return START_STICKY;
                  }

                  @Override
                  public void onDestroy() {
                      if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP && mMediaSession != null) {
                          mMediaSession.release();
                      }
                      super.onDestroy();
                  }

                  @Override
                  public android.os.IBinder onBind(Intent intent) {
                      return null;
                  }
              }
          }

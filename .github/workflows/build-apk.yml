              @JavascriptInterface
              public void triggerDynamicNotification(String jsonConfig) {
                  try {
                      JSONObject config = new JSONObject(jsonConfig);
                      final int id = config.optInt("id", (int) System.currentTimeMillis());
                      final String title = config.optString("title", "HopFile Notification");
                      final String message = config.optString("message", "");
                      final String type = config.optString("type", "basic");
                      final String channelId = config.optString("channelId", "default");
                      final String channelName = config.optString("channelName", "Standard Alerts");
                      final int importance = config.optInt("importance", 3);
                      final boolean ongoing = config.optBoolean("ongoing", false);
                      final boolean silent = config.optBoolean("silent", false);
                      final int progress = config.optInt("progress", -1);
                      final int maxProgress = config.optInt("maxProgress", 100);
                      final boolean indeterminate = config.optBoolean("indeterminate", false);
                      final String bigText = config.optString("bigText", "");
                      final String bigPictureBase64 = config.optString("bigPictureBase64", "");
                      final int badgeCount = config.optInt("badgeCount", 0);
                      final int visibility = config.optInt("visibility", 1);
                      final String category = config.optString("category", "");
                      final long delayMs = config.optLong("delayMs", 0);
                      final boolean fullScreen = config.optBoolean("fullScreen", false);
                      final boolean foregroundService = config.optBoolean("foregroundService", false);

                      if (foregroundService) {
                          runOnUiThread(new Runnable() {
                              @Override
                              public void run() {
                                  Intent serviceIntent = new Intent(MainActivity.this, WebRunnerService.class);
                                  startService(serviceIntent);
                              }
                          });
                          return;
                      }

                      if (delayMs > 0) {
                          Intent alarmIntent = new Intent(this, NotificationReceiver.class);
                          alarmIntent.putExtra("title", title);
                          alarmIntent.putExtra("message", message);
                          alarmIntent.putExtra("id", id);
                          PendingIntent pendingAlarm = PendingIntent.getBroadcast(
                                  this, id, alarmIntent, PendingIntent.FLAG_UPDATE_CURRENT | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0)
                          );
                          android.app.AlarmManager alarmManager = (android.app.AlarmManager) getSystemService(Context.ALARM_SERVICE);
                          if (alarmManager != null) {
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {
                                  alarmManager.setExactAndAllowWhileIdle(android.app.AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + delayMs, pendingAlarm);
                              } else {
                                  alarmManager.set(android.app.AlarmManager.RTC_WAKEUP, System.currentTimeMillis() + delayMs, pendingAlarm);
                              }
                          }
                          return;
                      }

                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              NotificationManager manager = (NotificationManager) getSystemService(NOTIFICATION_SERVICE);
                              if (manager == null) return;

                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  NotificationChannel channel = new NotificationChannel(channelId, channelName, importance);
                                  if (silent) {
                                      channel.setSound(null, null);
                                      channel.enableVibration(false);
                                  }
                                  manager.createNotificationChannel(channel);
                              }

                              Notification.Builder builder;
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                                  builder = new Notification.Builder(MainActivity.this, channelId);
                              } else {
                                  builder = new Notification.Builder(MainActivity.this);
                              }

                              builder.setSmallIcon(R.mipmap.ic_launcher)
                                      .setContentTitle(title)
                                      .setContentText(message)
                                      .setOngoing(ongoing)
                                      .setOnlyAlertOnce(true)
                                      .setAutoCancel(true);

                              if (badgeCount > 0) {
                                  builder.setNumber(badgeCount);
                              }

                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                                  builder.setVisibility(visibility);
                                  if (!category.isEmpty()) {
                                      builder.setCategory(category);
                                  }
                              }

                              if (importance >= 4) {
                                  builder.setPriority(Notification.PRIORITY_HIGH);
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                                      builder.setDefaults(Notification.DEFAULT_ALL);
                                  }
                              } else if (silent) {
                                  builder.setPriority(Notification.PRIORITY_MIN);
                              }

                              Intent clickIntent = new Intent(MainActivity.this, MainActivity.class);
                              clickIntent.setFlags(Intent.FLAG_ACTIVITY_CLEAR_TOP | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                              PendingIntent pendingClick = PendingIntent.getActivity(
                                      MainActivity.this, id, clickIntent, PendingIntent.FLAG_UPDATE_CURRENT | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0)
                              );
                              builder.setContentIntent(pendingClick);

                              if (fullScreen) {
                                  Intent fsIntent = new Intent(MainActivity.this, MainActivity.class);
                                  PendingIntent pendingFS = PendingIntent.getActivity(
                                          MainActivity.this, id, fsIntent, PendingIntent.FLAG_UPDATE_CURRENT | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_IMMUTABLE : 0)
                                  );
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.LOLLIPOP) {
                                      builder.setFullScreenIntent(pendingFS, true);
                                  }
                              }

                              if (progress >= 0 || indeterminate) {
                                  builder.setProgress(maxProgress, progress, indeterminate);
                              }

                              if (!bigText.isEmpty()) {
                                  Notification.BigTextStyle bigStyle = new Notification.BigTextStyle();
                                  bigStyle.bigText(bigText);
                                  builder.setStyle(bigStyle);
                              }

                              if (!bigPictureBase64.isEmpty()) {
                                  try {
                                      byte[] decodedString = Base64.decode(bigPictureBase64, Base64.DEFAULT);
                                      android.graphics.Bitmap bitmap = android.graphics.BitmapFactory.decodeByteArray(decodedString, 0, decodedString.length);
                                      Notification.BigPictureStyle picStyle = new Notification.BigPictureStyle();
                                      picStyle.bigPicture(bitmap);
                                      builder.setStyle(picStyle);
                                  } catch (Exception ex) { ex.printStackTrace(); }
                              }

                              JSONArray inboxLines = config.optJSONArray("inboxLines");
                              if (inboxLines != null && inboxLines.length() > 0) {
                                  Notification.InboxStyle inboxStyle = new Notification.InboxStyle();
                                  for (int i = 0; i < inboxLines.length(); i++) {
                                      inboxStyle.addLine(inboxLines.optString(i));
                                  }
                                  builder.setStyle(inboxStyle);
                              }

                              JSONArray actions = config.optJSONArray("actions");
                              if (actions != null && actions.length() > 0) {
                                  for (int i = 0; i < actions.length(); i++) {
                                      JSONObject actObj = actions.optJSONObject(i);
                                      if (actObj != null) {
                                          String actTitle = actObj.optString("title", "Action");
                                          String actCode = actObj.optString("actionCode", "");
                                          Intent actIntent = new Intent(MainActivity.this, ActionReceiver.class);
                                          actIntent.putExtra("actionCode", actCode);
                                          actIntent.putExtra("id", id);
                                          PendingIntent pendingAct = PendingIntent.getBroadcast(
                                                  MainActivity.this, id + i + 1000, actIntent, PendingIntent.FLAG_UPDATE_CURRENT | (Build.VERSION.SDK_INT >= Build.VERSION_CODES.M ? PendingIntent.FLAG_MUTABLE : 0)
                                          );
                                          builder.addAction(R.mipmap.ic_launcher, actTitle, pendingAct);
                                      }
                                  }
                              }

                              if ("custom".equals(type)) {
                                  RemoteViews remoteViews = new RemoteViews(getPackageName(), R.layout.custom_notification);
                                  remoteViews.setTextViewText(R.id.custom_notif_title, title);
                                  remoteViews.setTextViewText(R.id.custom_notif_message, message);
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.N) {
                                      builder.setCustomContentView(remoteViews);
                                  } else {
                                      builder.setContent(remoteViews);
                                  }
                              }

                              manager.notify(id, builder.build());
                          }
                      });
                  } catch (Exception e) {
                      e.printStackTrace();
                  }
              }

              @JavascriptInterface
              public void cancelNotification(final int id) {
                  runOnUiThread(new Runnable() {

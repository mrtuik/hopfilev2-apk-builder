              public void saveBase64File(final String base64Data, final String mimeType, final String fileName) {
                  try {
                      final byte[] fileBytes = Base64.decode(base64Data, Base64.DEFAULT);
                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              try {
                                  OutputStream os;
                                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                      ContentValues values = new ContentValues();
                                      values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                                      values.put(MediaStore.MediaColumns.MIME_TYPE, mimeType);
                                      values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                                      Uri uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                                      if (uri == null) {
                                          Toast.makeText(MainActivity.this, "Failed to create download target.", Toast.LENGTH_SHORT).show();
                                          return;
                                      }
                                      os = getContentResolver().openOutputStream(uri);
                                      if (os != null) {
                                          os.write(fileBytes);
                                          os.close();
                                          Toast.makeText(MainActivity.this, "File saved to Downloads folder!", Toast.LENGTH_LONG).show();
                                          showNotification("Download Completed", fileName + " saved to Downloads.");
                                      }
                                  } else {
                                      java.io.File downloadDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                                      java.io.File file = new java.io.File(downloadDir, fileName);
                                      os = new java.io.FileOutputStream(file);
                                      if (os != null) {
                                          os.write(fileBytes);
                                          os.close();
                                          Toast.makeText(MainActivity.this, "File saved to Downloads folder!", Toast.LENGTH_LONG).show();
                                          showNotification("Download Completed", fileName + " saved to Downloads.");
                                      }
                                  }
                              } catch (Exception ex) {
                                  ex.printStackTrace();
                                  Toast.makeText(MainActivity.this, "Error saving file: " + ex.getMessage(), Toast.LENGTH_LONG).show();
                              }
                          }
                      });
                  } catch (final Exception e) {
                      e.printStackTrace();
                      runOnUiThread(new Runnable() {
                          @Override
                          public void run() {
                              Toast.makeText(MainActivity.this, "Decoder Error: " + e.getMessage(), Toast.LENGTH_LONG).show();
                          }
                      });
                  }
              }

              public void startNativeDownload(final String urlString, final String fileName) {
                  new Thread(new Runnable() {
                      @Override
                      public void run() {
                          Uri uri = null;
                          java.io.InputStream input = null;
                          java.io.OutputStream output = null;
                          java.net.HttpURLConnection connection = null;
                          final int notificationId = 1001;
                          
                          try {
                              showProgressNotification("Download Started", fileName, 0, 100, true, notificationId);
                              
                              java.net.URL url = new java.net.URL(urlString);
                              connection = (java.net.HttpURLConnection) url.openConnection();
                              connection.connect();
                              
                              if (connection.getResponseCode() != java.net.HttpURLConnection.HTTP_OK) {
                                  throw new Exception("Server returned HTTP " + connection.getResponseCode());
                              }
                              
                              int fileLength = connection.getContentLength();
                              input = connection.getInputStream();
                              
                              if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.Q) {
                                  ContentValues values = new ContentValues();
                                  values.put(MediaStore.MediaColumns.DISPLAY_NAME, fileName);
                                  values.put(MediaStore.MediaColumns.RELATIVE_PATH, Environment.DIRECTORY_DOWNLOADS);
                                  uri = getContentResolver().insert(MediaStore.Downloads.EXTERNAL_CONTENT_URI, values);
                                  if (uri == null) throw new Exception("Failed to insert media store record");
                                  output = getContentResolver().openOutputStream(uri);
                              } else {
                                  java.io.File downloadDir = Environment.getExternalStoragePublicDirectory(Environment.DIRECTORY_DOWNLOADS);
                                  java.io.File file = new java.io.File(downloadDir, fileName);
                                  output = new java.io.FileOutputStream(file);
                              }
                              
                              byte[] data = new byte[4096];
                              long total = 0;
                              int count;
                              int lastProgress = 0;
                              
                              while ((count = input.read(data)) != -1) {
                                  total += count;
                                  if (fileLength > 0) {
                                      int progress = (int) (total * 100 / fileLength);
                                      if (progress - lastProgress >= 5 || progress == 100) {
                                          lastProgress = progress;
                                          showProgressNotification("Downloading", fileName, progress, 100, false, notificationId);
                                      }
                                  }
                                  output.write(data, 0, count);
                              }
                              
                              showNotification("Download Completed", fileName + " saved successfully.");
                              runOnUiThread(new Runnable() {
                                  @Override
                                  public void run() {
                                      Toast.makeText(MainActivity.this, "Download Complete: " + fileName, Toast.LENGTH_SHORT).show();
                                  }
                              });
                              
                          } catch (final Exception e) {
                              e.printStackTrace();
                              showNotification("Download Failed", fileName + " failed: " + e.getMessage());
                              runOnUiThread(new Runnable() {
                                  @Override
                                  public void run() {
                                      Toast.makeText(MainActivity.this, "Download Error: " + e.getLocalizedMessage(), Toast.LENGTH_LONG).show();
                                  }
                              });
                          } finally {
                              try {
                                  if (output != null) output.close();
                                  if (input != null) input.close();
                              } catch (java.io.IOException ignored) {}
                              if (connection != null) connection.disconnect();
                          }
                      }
                  }).start();
              }


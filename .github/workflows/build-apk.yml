name: Build APK from Web Archive

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Licenses Auto-Accept)
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Initialize Android Web-View Wrapper Template
        run: |
          echo "Initializing lightweight Gradle project structure..."
          mkdir -p app/src/main/java/com/example/runner
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          
          echo "org.gradle.java.home=${JAVA_HOME}" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          
          # Creating settings.gradle
          cat << 'EOF' > settings.gradle
          rootProject.name = 'WebRunner'
          include ':app'
          EOF
          
          # Creating build.gradle
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Fetch and Wrap Website Archive ZIP
        run: |
          echo "Verifying local web workspace ZIP archive inside repository..."
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found in repository!"
              exit 1
          fi
          
          echo "Extracting workspace targets deep into assets folder..."
          unzip -o "${ZIP_NAME}" -d app/src/main/assets/
          
          if [ ! -f app/src/main/assets/index.html ]; then
              echo "index.html not found in assets root. Checking subdirectories..."
              SUBDIR=$(find app/src/main/assets/ -name "index.html" -print -quit | sed 's|/index.html||')
              if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "app/src/main/assets" ]; then
                  echo "Found index.html in directory: $SUBDIR. Flattening contents..."
                  mv "$SUBDIR"/* app/src/main/assets/
              else
                  echo "WARNING: index.html not found in package payload!"
              fi
          fi

      - name: Generate Native Android Code from app_config.json
        run: |
          # Safe python pip installation of Pillow
          python3 -m pip install pillow
          
          cat << 'EOF' > build_assets.py
          import json
          import os
          import urllib.request
          from PIL import Image

          config_path = "app/src/main/assets/app_config.json"
          config = {}
          if os.path.exists(config_path):
              with open(config_path, "r") as f:
                  config = json.load(f)

          # Extract configurations
          app_name = config.get("appName", os.environ.get("APP_NAME", "My App"))
          package_id = config.get("packageName", os.environ.get("PACKAGE_ID", "com.example.runner"))
          version_name = config.get("versionName", os.environ.get("VERSION_NAME", "1.0.0"))
          version_code = int(config.get("versionCode", os.environ.get("VERSION_CODE", "1")))
          theme_color = config.get("themeColor", "#4F46E5")
          homepage = config.get("homepage", "index.html")
          screen_rotation = config.get("screenRotation", "auto")
          splash_bg_color = config.get("splashBgColor", "#111827")
          splash_duration = int(config.get("splashDuration", 2000))

          # Dynamic Feature Toggles
          php_support = config.get("phpSupport", True)
          database_enabled = config.get("databaseEnabled", True)
          camera_enabled = config.get("cameraEnabled", True)
          notifications_enabled = config.get("notificationsEnabled", True)
          local_storage_enabled = config.get("localStorageEnabled", True)
          fullscreen_enabled = config.get("fullscreenEnabled", True)
          autoplay_enabled = config.get("autoplayEnabled", True)
          microphone_enabled = config.get("microphoneEnabled", True)
          hide_title_bar = config.get("hideTitleBar", True)
          swipe_refresh_enabled = config.get("swipeRefreshEnabled", True)
          long_press_enabled = config.get("longPressEnabled", True)
          loading_ui_enabled = config.get("loadingUIEnabled", True)
          pc_mode_enabled = config.get("pcModeEnabled", False)
          zoom_enabled = config.get("zoomEnabled", True)
          has_custom_splash = config.get("hasCustomSplash", False)

          # Write app/build.gradle using safe placeholder replacements
          app_build_gradle_template = """
          apply plugin: 'com.android.application'
          android {
              namespace 'com.example.runner'
              compileSdk 33
              defaultConfig {
                  applicationId "__PACKAGE_ID__"
                  minSdk 24
                  targetSdk 33
                  versionCode __VERSION_CODE__
                  versionName "__VERSION_NAME__"
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'androidx.swiperefreshlayout:swiperefreshlayout:1.1.0'
              implementation 'com.google.android.material:material:1.9.0'
          }
          """
          app_build_gradle = app_build_gradle_template.replace("__PACKAGE_ID__", package_id)
          app_build_gradle = app_build_gradle.replace("__VERSION_CODE__", str(version_code))
          app_build_gradle = app_build_gradle.replace("__VERSION_NAME__", version_name)
          
          with open("app/build.gradle", "w") as f:
              f.write(app_build_gradle.strip())

          # Write colors.xml
          colors_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">__THEME_COLOR__</color>
              <color name="colorPrimaryDark">__THEME_COLOR__</color>
              <color name="colorAccent">__THEME_COLOR__</color>
              <color name="splashBg">__SPLASH_BG_COLOR__</color>
          </resources>
          """
          colors_xml = colors_xml_template.replace("__THEME_COLOR__", theme_color).replace("__SPLASH_BG_COLOR__", splash_bg_color)
          with open("app/src/main/res/values/colors.xml", "w") as f:
              f.write(colors_xml.strip())

          # Write styles.xml
          theme_style_parent = "Theme.AppCompat.Light.NoActionBar"
          theme_items = ""
          if fullscreen_enabled:
              theme_items = """<item name="android:windowFullscreen">true</item>
              <item name="android:windowNoTitle">true</item>"""
          elif hide_title_bar:
              theme_items = """<item name="android:windowNoTitle">true</item>"""
          else:
              theme_style_parent = "Theme.AppCompat.Light.DarkActionBar"

          styles_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="SplashTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="android:windowBackground">@color/splashBg</item>
                  <item name="android:windowFullscreen">true</item>
              </style>
              <style name="AppTheme" parent="__THEME_STYLE_PARENT__">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="colorAccent">@color/colorAccent</item>
                  __THEME_ITEMS__
              </style>
          </resources>
          """
          styles_xml = styles_xml_template.replace("__THEME_STYLE_PARENT__", theme_style_parent).replace("__THEME_ITEMS__", theme_items)
          with open("app/src/main/res/values/styles.xml", "w") as f:
              f.write(styles_xml.strip())

          # Write activity_splash.xml
          splash_src_drawable = "@drawable/splash_icon" if has_custom_splash else "@mipmap/ic_launcher"
          activity_splash_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/splashBg">
              <ImageView
                  android:id="@+id/splash_logo"
                  android:layout_width="160dp"
                  android:layout_height="160dp"
                  android:layout_centerInParent="true"
                  android:src="__SPLASH_SRC_DRAWABLE__"
                  android:visibility="visible" />
          </RelativeLayout>
          """
          activity_splash_xml = activity_splash_xml_template.replace("__SPLASH_SRC_DRAWABLE__", splash_src_drawable)
          with open("app/src/main/res/layout/activity_splash.xml", "w") as f:
              f.write(activity_splash_xml.strip())

          # Write activity_main.xml
          loading_progress_bar = ""
          if loading_ui_enabled:
              loading_progress_bar = """<ProgressBar
                  android:id="@+id/progressBar"
                  style="?android:attr/progressBarStyleHorizontal"
                  android:layout_width="match_parent"
                  android:layout_height="6dp"
                  android:layout_alignParentTop="true"
                  android:progressDrawable="@android:drawable/progress_horizontal"
                  android:visibility="gone" />"""

          layout_below_attr = 'android:layout_below="@id/progressBar"' if loading_ui_enabled else ""
          
          swipe_refresh_layout_start = ""
          swipe_refresh_layout_end = ""
          webview_layout_below = ""
          
          if swipe_refresh_enabled:
              swipe_refresh_layout_start = """<androidx.swiperefreshlayout.widget.SwipeRefreshLayout
                  android:id="@+id/swipeRefreshLayout"
                  android:layout_width="match_parent"
                  android:layout_height="match_parent"
                  __LAYOUT_BELOW__>"""
              swipe_refresh_layout_start = swipe_refresh_layout_start.replace("__LAYOUT_BELOW__", layout_below_attr)
              swipe_refresh_layout_end = "</androidx.swiperefreshlayout.widget.SwipeRefreshLayout>"
          else:
              webview_layout_below = layout_below_attr

          activity_main_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent">
                  __LOADING_PROGRESS_BAR__
                  __SWIPE_REFRESH_LAYOUT_START__
                  <WebView
                      android:id="@+id/webview"
                      android:layout_width="match_parent"
                      android:layout_height="match_parent"
                      __WEBVIEW_LAYOUT_BELOW__ />
                  __SWIPE_REFRESH_LAYOUT_END__
          </RelativeLayout>
          """
          activity_main_xml = activity_main_xml_template.replace("__LOADING_PROGRESS_BAR__", loading_progress_bar)
          activity_main_xml = activity_main_xml.replace("__SWIPE_REFRESH_LAYOUT_START__", swipe_refresh_layout_start)
          activity_main_xml = activity_main_xml.replace("__WEBVIEW_LAYOUT_BELOW__", webview_layout_below)
          activity_main_xml = activity_main_xml.replace("__SWIPE_REFRESH_LAYOUT_END__", swipe_refresh_layout_end)
          
          with open("app/src/main/res/layout/activity_main.xml", "w") as f:
              f.write(activity_main_xml.strip())

          # Custom RemoteView layout for custom notifications
          os.makedirs("app/src/main/res/layout", exist_ok=True)
          custom_notification_xml = """<?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="64dp"
              android:padding="8dp"
              android:background="#131A2E">
              <ImageView
                  android:id="@+id/custom_notif_icon"
                  android:layout_width="48dp"
                  android:layout_height="48dp"
                  android:src="@mipmap/ic_launcher"
                  android:layout_alignParentLeft="true"
                  android:layout_centerVertical="true" />
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="vertical"
                  android:layout_toRightOf="@id/custom_notif_icon"
                  android:layout_marginLeft="12dp"
                  android:layout_centerVertical="true">
                  <TextView
                      android:id="@+id/custom_notif_title"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:textColor="#FFFFFF"
                      android:textSize="14sp"
                      android:textStyle="bold" />
                  <TextView
                      android:id="@+id/custom_notif_message"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:textColor="#94A3B8"
                      android:textSize="11sp" />
              </LinearLayout>
          </RelativeLayout>
          """
          with open("app/src/main/res/layout/custom_notification.xml", "w") as f:
              f.write(custom_notification_xml.strip())

          # Handle Permissions
          camera_permission_manifest = '<uses-permission android:name="android.permission.CAMERA" />' if camera_enabled else ""
          audio_permission_manifest = '<uses-permission android:name="android.permission.RECORD_AUDIO" />\n<uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />' if microphone_enabled else ""
          notification_permission_manifest = '<uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n<uses-permission android:name="android.permission.FOREGROUND_SERVICE" />' if notifications_enabled else ""
          
          storage_permission_manifest = ""
          if local_storage_enabled:
              storage_permission_manifest = """
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              """

          # Rotation preference mapping
          orientation_mode = "unspecified"
          if screen_rotation == "portrait":
              orientation_mode = "portrait"
          elif screen_rotation == "landscape":
              orientation_mode = "landscape"

          # Write AndroidManifest.xml (Including services and receivers)
          android_manifest_xml_template = """<?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              __CAMERA_PERMISSION_MANIFEST__
              __AUDIO_PERMISSION_MANIFEST__
              __NOTIFICATION_PERMISSION_MANIFEST__
              __STORAGE_PERMISSION_MANIFEST__
              
              <application
                  android:allowBackup="true"
                  android:label="@string/app_name"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:supportsRtl="true"
                  android:usesCleartextTraffic="true"
                  android:theme="@style/AppTheme">
                  
                  <activity
                      android:name="com.example.runner.SplashActivity"
                      android:exported="true"
                      android:theme="@style/SplashTheme"
                      android:screenOrientation="__ORIENTATION_MODE__">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>

                  <activity
                      android:name="com.example.runner.MainActivity"
                      android:exported="false"
                      android:configChanges="orientation|screenSize|keyboardHidden"
                      android:screenOrientation="__ORIENTATION_MODE__">
                  </activity>

                  <receiver android:name="com.example.runner.NotificationReceiver" android:exported="true" />
                  <receiver android:name="com.example.runner.ActionReceiver" android:exported="true" />
                  <service android:name="com.example.runner.WebRunnerService" android:exported="false" />
              </application>
          </manifest>
          """
          android_manifest_xml = android_manifest_xml_template.replace("__CAMERA_PERMISSION_MANIFEST__", camera_permission_manifest)
          android_manifest_xml = android_manifest_xml.replace("__AUDIO_PERMISSION_MANIFEST__", audio_permission_manifest)
          android_manifest_xml = android_manifest_xml.replace("__NOTIFICATION_PERMISSION_MANIFEST__", notification_permission_manifest)
          android_manifest_xml = android_manifest_xml.replace("__STORAGE_PERMISSION_MANIFEST__", storage_permission_manifest)
          android_manifest_xml = android_manifest_xml.replace("__ORIENTATION_MODE__", orientation_mode)
          
          with open("app/src/main/AndroidManifest.xml", "w") as f:
              f.write(android_manifest_xml.strip())

          # Write SplashActivity.java
          splash_activity_java_template = """package com.example.runner;
          import androidx.appcompat.app.AppCompatActivity;
          import android.content.Intent;
          import android.os.Bundle;
          import android.os.Handler;

          public class SplashActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_splash);
                  
                  new Handler().postDelayed(new Runnable() {
                      @Override
                      public void run() {
                          Intent intent = new Intent(SplashActivity.this, MainActivity.class);
                          startActivity(intent);
                          finish();
                      }
                  }, __SPLASH_DURATION__);
              }
          }
          """
          splash_activity_java = splash_activity_java_template.replace("__SPLASH_DURATION__", str(splash_duration))
          with open("app/src/main/java/com/example/runner/SplashActivity.java", "w") as f:
              f.write(splash_activity_java.strip())

          # Write WebRunnerService.java (For Background execution)
          webrunner_service_template = """package com.example.runner;
          import android.app.Service;
          import android.content.Intent;
          import android.os.IBinder;
          import android.app.Notification;
          import android.os.Build;

          public class WebRunnerService extends Service {
              @Override
              public int onStartCommand(Intent intent, int flags, int startId) {
                  Notification.Builder builder;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(this, "default");
                  } else {
                      builder = new Notification.Builder(this);
                  }
                  builder.setSmallIcon(R.mipmap.ic_launcher)
                          .setContentTitle("HopFile Background Services")
                          .setContentText("Persistent execution environment active.")
                          .setOngoing(true);
                  
                  startForeground(1001, builder.build());
                  return START_STICKY;
              }

              @Override
              public IBinder onBind(Intent intent) {
                  return null;
              }
          }
          """
          with open("app/src/main/java/com/example/runner/WebRunnerService.java", "w") as f:
              f.write(webrunner_service_template.strip())

          # Write NotificationReceiver.java (For scheduled alarms)
          notif_receiver_template = """package com.example.runner;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.app.NotificationManager;
          import android.app.Notification;
          import android.os.Build;

          public class NotificationReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  String title = intent.getStringExtra("title");
                  String message = intent.getStringExtra("message");
                  int id = intent.getIntExtra("id", 123);

                  Notification.Builder builder;
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      builder = new Notification.Builder(context, "default");
                  } else {
                      builder = new Notification.Builder(context);
                  }

                  builder.setSmallIcon(R.mipmap.ic_launcher)
                          .setContentTitle(title)
                          .setContentText(message)
                          .setAutoCancel(true);

                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null) {
                      manager.notify(id, builder.build());
                  }
              }
          }
          """
          with open("app/src/main/java/com/example/runner/NotificationReceiver.java", "w") as f:
              f.write(notif_receiver_template.strip())

          # Write ActionReceiver.java (For notification interactive buttons)
          action_receiver_template = """package com.example.runner;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          import android.app.NotificationManager;

          public class ActionReceiver extends BroadcastReceiver {
              @Override
              public void onReceive(Context context, Intent intent) {
                  String actionCode = intent.getStringExtra("actionCode");
                  int notificationId = intent.getIntExtra("id", 0);
                  
                  NotificationManager manager = (NotificationManager) context.getSystemService(Context.NOTIFICATION_SERVICE);
                  if (manager != null && notificationId != 0) {
                      manager.cancel(notificationId);
                  }

                  Intent launchIntent = new Intent(context, MainActivity.class);
                  launchIntent.putExtra("actionCode", actionCode);
                  launchIntent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK | Intent.FLAG_ACTIVITY_SINGLE_TOP);
                  context.startActivity(launchIntent);
              }
          }
          """
          with open("app/src/main/java/com/example/runner/ActionReceiver.java", "w") as f:
              f.write(action_receiver_template.strip())

          # Generate MainActivity.java
          swipe_import_block = "import androidx.swiperefreshlayout.widget.SwipeRefreshLayout;" if swipe_refresh_enabled else ""
          swipe_declaration_block = "private SwipeRefreshLayout mSwipeRefresh;" if swipe_refresh_enabled else ""
          progress_declaration_block = "private ProgressBar mProgress;" if loading_ui_enabled else ""
          
          progress_init_block = "mProgress = findViewById(R.id.progressBar);" if loading_ui_enabled else ""
          progress_update_block = """if (mProgress != null) {
              mProgress.setProgress(newProgress);
              if (newProgress == 100) {
                  mProgress.setVisibility(View.GONE);
              } else {
                  mProgress.setVisibility(View.VISIBLE);
              }
          }""" if loading_ui_enabled else ""

          local_storage_block = ""
          if local_storage_enabled:
              local_storage_block = """webSettings.setDomStorageEnabled(true);
              webSettings.setDatabaseEnabled(true);
              webSettings.setAllowFileAccess(true);
              webSettings.setAllowContentAccess(true);
              webSettings.setAllowFileAccessFromFileURLs(true);
              webSettings.setAllowUniversalAccessFromFileURLs(true);"""

          zoom_block = ""
          if zoom_enabled:
              zoom_block = """webSettings.setSupportZoom(true);
              webSettings.setBuiltInZoomControls(true);
              webSettings.setDisplayZoomControls(false);"""

          autoplay_ua_block = ""
          if autoplay_enabled:
              autoplay_ua_block += "webSettings.setMediaPlaybackRequiresUserGesture(false);\n"
          if pc_mode_enabled:
              autoplay_ua_block += """webSettings.setUserAgentString("Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, Gecko) Chrome/114.0.0.0 Safari/537.36");
              webSettings.setUseWideViewPort(true);
              webSettings.setLoadWithOverviewMode(true);"""

          swipe_refresh_code_block = ""
          swipe_refresh_stop_code_block = ""
          if swipe_refresh_enabled:
              swipe_refresh_code_block = """mSwipeRefresh = findViewById(R.id.swipeRefreshLayout);
              mSwipeRefresh.setOnRefreshListener(new SwipeRefreshLayout.OnRefreshListener() {
                  @Override
                  public void onRefresh() {
                      mWebView.reload();
                  }
              });"""
              swipe_refresh_stop_code_block = """if (mSwipeRefresh != null) {
                  mSwipeRefresh.setRefreshing(false);
              }"""

          long_press_code_block = ""
          if not long_press_enabled:
              long_press_code_block = """mWebView.setOnLongClickListener(new View.OnLongClickListener() {
                  @Override
                  public boolean onLongClick(View v) {
                      return true;
                  }
              });
                  mWebView.setLongClickable(false);"""

          download_manager_block = """mWebView.setDownloadListener(new DownloadListener() {
              @Override
              public void onDownloadStart(String url, String userAgent, String contentDisposition, String mimetype, long contentLength) {
                  if (url.startsWith("blob:") || url.startsWith("data:")) {
                      return;
                  }
                  DownloadManager.Request request = new DownloadManager.Request(Uri.parse(url));
                  request.setMimeType(mimetype);
                  String fileName = URLUtil.guessFileName(url, contentDisposition, mimetype);
                  request.setTitle(fileName);
                  request.setDescription("Downloading target assets...");
                  request.setNotificationVisibility(DownloadManager.Request.VISIBILITY_VISIBLE_NOTIFY_COMPLETED);
                  request.setDestinationInExternalPublicDir(Environment.DIRECTORY_DOWNLOADS, fileName);
                  DownloadManager dm = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);
                  if (dm != null) {
                      dm.enqueue(request);
                      Toast.makeText(MainActivity.this, "Download started...", Toast.LENGTH_SHORT).show();
                  }
              }
          });"""

          permission_manager_block = """ArrayList<String> permissions = new ArrayList<>();
          if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.TIRAMISU) {
              permissions.add("android.permission.POST_NOTIFICATIONS");
          }
          """
          if camera_enabled:
              permission_manager_block += 'permissions.add(Manifest.permission.CAMERA);\n'
          if microphone_enabled:
              permission_manager_block += 'permissions.add(Manifest.permission.RECORD_AUDIO);\n'
          if local_storage_enabled:
              permission_manager_block += 'permissions.add(Manifest.permission.WRITE_EXTERNAL_STORAGE);\n'

          permission_manager_block += """
          if (!permissions.isEmpty() && Build.VERSION.SDK_INT >= Build.VERSION_CODES.M) {

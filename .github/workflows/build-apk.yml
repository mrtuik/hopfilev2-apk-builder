name: Build APK from Web Archive (Optimized)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [build-apk]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      APP_NAME: ${{ github.event.client_payload.appName || 'My App' }}
      PACKAGE_ID: ${{ github.event.client_payload.packageId || 'com.example.runner' }}
      VERSION_NAME: ${{ github.event.client_payload.versionName || '1.0.0' }}
      VERSION_CODE: ${{ github.event.client_payload.versionCode || '1' }}
      ZIP_NAME: ${{ github.event.client_payload.zipName || 'web_payload.zip' }}

    steps:
      - name: Checkout Repository (Shallow)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # সম্পূর্ণ হিস্ট্রি ডাউনলোড না করে সময় বাঁচাবে

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # দ্রষ্টব্য: ubuntu-latest এ অ্যান্ড্রয়েড এসডিকে আগে থেকেই থাকে, তাই আলাদা এসডিকে সেটআপ স্টেপটি বাদ দেওয়া হয়েছে।

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_KEY }} # বিল্ড ক্যাশ আরও দ্রুত করতে সাহায্য করবে

      - name: Initialize Android Web-View Wrapper Template
        run: |
          mkdir -p app/src/main/java/com/example/runner
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/jniLibs/arm64-v8a
          
          echo "org.gradle.java.home=${JAVA_HOME}" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          echo "android.bundle.enableUncompressedNativeLibs=false" >> gradle.properties
          
          cat << 'EOF' > settings.gradle
          rootProject.name = 'WebRunner'
          include ':app'
          EOF
          
          cat << 'EOF' > build.gradle
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.0.2'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Fetch Website Archive and Clean Assets
        run: |
          if [ ! -f "${ZIP_NAME}" ]; then
              echo "ERROR: ${ZIP_NAME} not found!"
              exit 1
          fi
          unzip -o "${ZIP_NAME}" -d app/src/main/assets/
          
          if [ ! -f app/src/main/assets/index.html ] && [ ! -f app/src/main/assets/index.php ]; then
              SUBDIR=$(find app/src/main/assets/ -name "index.html" -o -name "index.php" -print -quit | sed 's|/index.html||' | sed 's|/index.php||')
              if [ -n "$SUBDIR" ] && [ "$SUBDIR" != "app/src/main/assets" ]; then
                  mv "$SUBDIR"/* app/src/main/assets/
              fi
          fi

      # PHP Binary ফাইলের জন্য ক্যাশ মেমোরি ব্যবহার করা (প্রতিবার ডাউনলোড করার প্রয়োজন নেই)
      - name: Cache PHP Binary
        id: cache-php
        uses: actions/cache@v3
        with:
          path: app/src/main/jniLibs/arm64-v8a/libphp.so
          key: php-8.4-android-arm64-v1

      - name: Fetch and Bundle Native PHP Binary
        if: steps.cache-php.outputs.cache-hit != 'true'
        run: |
          wget -q https://github.com/pmmp/PHP-Binaries/releases/download/pm5-php-8.4-latest/PHP-8.4-Android-arm64-PM5.tar.gz -O php.tar.gz
          mkdir php_bin
          tar -xzf php.tar.gz -C php_bin
          PHP_BIN_PATH=$(find php_bin -name "php" -type f -print -quit)
          if [ -n "$PHP_BIN_PATH" ]; then
              cp "$PHP_BIN_PATH" app/src/main/jniLibs/arm64-v8a/libphp.so
          else
              exit 1
          fi

      - name: Generate Native Android Code from app_config.json
        run: |
          python3 -m pip install Pillow --break-system-packages --quiet
          python3 build_assets.py # পূর্বে আপনার স্ক্রিপ্টটি যেভাবে ছিল সেভাবে এটি কাজ করবে

      - name: Write strings.xml resource values
        run: |
          cat << EOF > app/src/main/res/values/strings.xml
          <resources>
              <string name="app_name">${APP_NAME}</string>
          </resources>
          EOF

      - name: Setup Gradle Wrapper
        run: |
          gradle wrapper --gradle-version 8.0.2

      - name: Run APK Compile Gradle Task (Optimized)
        run: |
          # --parallel, --build-cache এবং --no-daemon ফ্ল্যাগ দ্রুত বিল্ড করতে সাহায্য করবে
          ./gradlew :app:assembleDebug --parallel --build-cache --no-daemon

      - name: Package APK into ZIP and Rename
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          APK_NAME="${CLEANED_NAME}_v${VERSION_NAME}.apk"
          ZIP_OUT_NAME="${CLEANED_NAME}_v${VERSION_NAME}_APK.zip"
          
          cat << 'EOF' > app/build/outputs/apk/debug/credits.txt
          ==================================================
          HopFile Editor - Release Staging Package
          ==================================================
          This package was generated dynamically by HopFile Editor Workspace.
          ==================================================
          EOF
          
          cd app/build/outputs/apk/debug/
          mv app-debug.apk $APK_NAME
          zip -r $ZIP_OUT_NAME $APK_NAME credits.txt

      - name: Generate Unique Release Tag
        id: tag_gen
        run: |
          CLEANED_NAME=$(echo "${APP_NAME}" | tr -cd '[:alnum:]_')
          TAG="release-${CLEANED_NAME}-${{ github.run_number }}"
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT

      # সরাসরি গিটহাব আর্টিফ্যাক্ট হিসেবে আপলোড করা (রিলিজ তৈরি করার চেয়ে এটি অনেক দ্রুত কাজ করে)
      - name: Upload APK as Artifact (Super Fast Option)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-APK
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 1

      - name: Create GitHub Release and Upload APK
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_gen.outputs.TAG_NAME }}
          name: "Release: ${{ env.APP_NAME }} (v${{ env.VERSION_NAME }})"
          body: |
            Automated Android package build for **${{ env.APP_NAME }}**
          files: |
            app/build/outputs/apk/debug/*.apk
            app/build/outputs/apk/debug/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up temporary payload zip from git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git rm -f "${ZIP_NAME}" || true
          git commit -m "chore: clean up temporary build payload [skip ci]" || true
          git push origin main || git push origin master || true
